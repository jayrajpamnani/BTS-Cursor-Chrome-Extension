<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTS Cursor Customizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #f3e8ff 0%, #fdf2f8 100%);
      padding: 16px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      border: 1px solid #e5e7eb;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: bold;
      color: #1f2937;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      color: #6b7280;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo svg {
      width: 100%;
      height: 100%;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .section h3 {
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    
    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }
    
    .toggle-label {
      font-size: 14px;
      color: #374151;
    }
    
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: #d1d5db;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }
    
    .toggle-switch.active {
      background: #8b5cf6;
    }
    
    .toggle-slider {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }
    
    .toggle-switch.active .toggle-slider {
      transform: translateX(20px);
    }
    
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      background: white;
      cursor: pointer;
    }
    
    select:focus {
      outline: none;
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }
    

    
    .btn {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }
    
    .btn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .success {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #10b981;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      z-index: 1000;
    }
    
    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: #6b7280;
    }
    
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 16px;
    }
    
    .status {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      color: #0369a1;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      margin-bottom: 16px;
      text-align: center;
    }
    
    .debug {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      color: #92400e;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 10px;
      margin-bottom: 16px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <img src="assets/BTS_Extension_Icon.png" alt="BTS Logo" width="32" height="32">
      </div>
      <h1>BTS Cursor</h1>
    </div>
    
    <div class="section">
      <div class="toggle">
        <span class="toggle-label">Enable Custom Cursor</span>
        <div class="toggle-switch" id="toggleSwitch">
          <div class="toggle-slider"></div>
        </div>
      </div>
    </div>
    
    <div class="section">
      <h3>Choose Cursor Style</h3>
      <select id="cursorSelect">
        <option value="auto">Auto (Smart Switch)</option>
        <option value="bts-logo-white">BTS Logo (White)</option>
        <option value="bts-logo-black">BTS Logo (Black)</option>
      </select>
    </div>
    

    
    <div class="status" id="status" style="display: none;">
      Cursor settings updated!
    </div>
    
    <div class="debug" id="debug" style="display: none;">
      Debug info will appear here
    </div>
    
    <button class="btn" id="saveBtn">
      <span id="btnText">Apply Cursor</span>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>Saving...</span>
      </div>
    </button>
    
    <div class="footer">
      Changes apply to all tabs automatically
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
